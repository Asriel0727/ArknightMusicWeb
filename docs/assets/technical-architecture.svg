<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="500" viewBox="0 0 1040 500" role="img" aria-labelledby="title desc">
  <title id="title">技術架構圖</title>
  <desc id="desc">顯示 Vue 前端、Cloudflare Worker、Supabase、KV、Cache 與外部資料來源的關係。</desc>
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .box { fill: #161b22; stroke: #30363d; stroke-width: 1.5; }
      .accent { fill: #58a6ff; }
      .text { fill: #c9d1d9; font: 600 17px system-ui, sans-serif; }
      .small { fill: #8b949e; font: 13px system-ui, sans-serif; }
      .line { stroke: #58a6ff; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #8b949e; stroke-width: 2; fill: none; marker-end: url(#arrow2); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#58a6ff" />
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b949e" />
    </marker>
  </defs>
  <rect class="bg" width="1040" height="500" rx="18" />
  <rect class="box" x="42" y="188" width="190" height="110" rx="10" />
  <text class="text" x="137" y="230" text-anchor="middle">Vue 3 Frontend</text>
  <text class="small" x="137" y="256" text-anchor="middle">播放器 / 專輯 / 清單</text>
  <rect class="box" x="310" y="172" width="210" height="142" rx="10" />
  <text class="text" x="415" y="220" text-anchor="middle">Cloudflare Worker</text>
  <text class="small" x="415" y="246" text-anchor="middle">API / Auth / Proxy</text>
  <text class="small" x="415" y="268" text-anchor="middle">Translation / Share OG</text>
  <rect class="box" x="615" y="40" width="180" height="92" rx="10" />
  <text class="text" x="705" y="78" text-anchor="middle">Supabase</text>
  <text class="small" x="705" y="104" text-anchor="middle">歌單 / 收藏 / Cache</text>
  <rect class="box" x="615" y="158" width="180" height="92" rx="10" />
  <text class="text" x="705" y="196" text-anchor="middle">Cloudflare KV</text>
  <text class="small" x="705" y="222" text-anchor="middle">角色資料 / Session</text>
  <rect class="box" x="615" y="276" width="180" height="92" rx="10" />
  <text class="text" x="705" y="314" text-anchor="middle">Cloudflare Cache</text>
  <text class="small" x="705" y="340" text-anchor="middle">圖片 / 歌詞 / API</text>
  <rect class="box" x="840" y="68" width="160" height="92" rx="10" />
  <text class="text" x="920" y="106" text-anchor="middle">Music API</text>
  <text class="small" x="920" y="132" text-anchor="middle">專輯 / 歌曲 / 歌詞</text>
  <rect class="box" x="840" y="218" width="160" height="92" rx="10" />
  <text class="text" x="920" y="256" text-anchor="middle">Game Data</text>
  <text class="small" x="920" y="282" text-anchor="middle">角色 JSON</text>
  <rect class="box" x="840" y="368" width="160" height="92" rx="10" />
  <text class="text" x="920" y="406" text-anchor="middle">Image Mirrors</text>
  <text class="small" x="920" y="432" text-anchor="middle">多來源 fallback</text>
  <path class="line" d="M232 243 H302" />
  <path class="line" d="M520 208 H607" />
  <path class="line" d="M520 243 H607" />
  <path class="line" d="M520 278 H607" />
  <path class="soft" d="M795 86 H832" />
  <path class="soft" d="M795 204 C820 214 820 244 832 258" />
  <path class="soft" d="M795 322 C825 340 825 390 832 414" />
  <path class="soft" d="M840 414 C770 414 745 385 720 368" />
</svg>
