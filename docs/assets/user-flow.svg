<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">使用者功能流程</title>
  <desc id="desc">顯示使用者從首頁進入專輯、播放器、我的清單與角色功能的流程。</desc>
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .panel { fill: #161b22; stroke: #30363d; stroke-width: 1.5; }
      .primary { fill: #58a6ff; }
      .text { fill: #c9d1d9; font: 600 18px system-ui, sans-serif; }
      .small { fill: #8b949e; font: 14px system-ui, sans-serif; }
      .line { stroke: #58a6ff; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#58a6ff" />
    </marker>
  </defs>
  <rect class="bg" width="980" height="420" rx="18" />
  <rect class="panel" x="40" y="54" width="190" height="90" rx="10" />
  <text class="text" x="135" y="94" text-anchor="middle">首頁</text>
  <text class="small" x="135" y="120" text-anchor="middle">專輯 / 搜尋 / 導覽</text>
  <rect class="panel" x="300" y="40" width="190" height="90" rx="10" />
  <text class="text" x="395" y="80" text-anchor="middle">專輯詳情</text>
  <text class="small" x="395" y="106" text-anchor="middle">歌曲列表與介紹</text>
  <rect class="panel" x="560" y="40" width="190" height="90" rx="10" />
  <text class="text" x="655" y="80" text-anchor="middle">播放器</text>
  <text class="small" x="655" y="106" text-anchor="middle">歌詞 / 翻譯 / 分享</text>
  <rect class="panel" x="300" y="170" width="190" height="90" rx="10" />
  <text class="text" x="395" y="210" text-anchor="middle">我的清單</text>
  <text class="small" x="395" y="236" text-anchor="middle">收藏 / 歌單 / 角色</text>
  <rect class="panel" x="560" y="170" width="190" height="90" rx="10" />
  <text class="text" x="655" y="210" text-anchor="middle">歌單播放</text>
  <text class="small" x="655" y="236" text-anchor="middle">指定歌曲與 queue</text>
  <rect class="panel" x="300" y="300" width="190" height="90" rx="10" />
  <text class="text" x="395" y="340" text-anchor="middle">幹員圖鑑</text>
  <text class="small" x="395" y="366" text-anchor="middle">搜尋 / 篩選</text>
  <rect class="panel" x="560" y="300" width="190" height="90" rx="10" />
  <text class="text" x="655" y="340" text-anchor="middle">角色詳情</text>
  <text class="small" x="655" y="366" text-anchor="middle">立繪 / 技能 / 資料</text>
  <rect class="panel" x="800" y="170" width="140" height="90" rx="10" />
  <text class="text" x="870" y="210" text-anchor="middle">登入</text>
  <text class="small" x="870" y="236" text-anchor="middle">同步個人資料</text>
  <path class="line" d="M230 99 H292" />
  <path class="line" d="M490 85 H552" />
  <path class="line" d="M230 120 C260 170 270 200 292 210" />
  <path class="line" d="M490 215 H552" />
  <path class="line" d="M230 130 C250 265 270 330 292 345" />
  <path class="line" d="M490 345 H552" />
  <path class="line" d="M750 215 H792" />
  <path class="line" d="M655 170 V138" />
</svg>
