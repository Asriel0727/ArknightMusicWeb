<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARK Recruit Card Maker - Professional Edition</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-tertiary: #f5f5f0;
    --color-text-primary: #111111;
    --color-text-secondary: #888888;
    --color-border-tertiary: #e5e5e5;
    --color-border-secondary: #dddddd;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--color-background-tertiary); color: var(--color-text-primary); height: 100vh; overflow: hidden; }
  .app { display: flex; flex-direction: column; height: 100vh; }

  .header {
    height: 48px; background: var(--color-background-primary);
    border-bottom: 0.5px solid var(--color-border-tertiary);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; flex-shrink: 0; z-index: 100;
  }
  .logo { font-size: 18px; font-weight: 900; color: #000; letter-spacing: -0.02em; }
  .header-btns { display: flex; gap: 10px; }
  .btn-random {
    background: #fff; color: #111; border: 1px solid #111; border-radius: 6px;
    padding: 6px 16px; font-size: 13px; cursor: pointer; font-weight: 500;
  }
  .btn-export {
    background: #111; color: #fff; border: none; border-radius: 6px;
    padding: 6px 16px; font-size: 13px; cursor: pointer; font-weight: 500;
  }

  .main { display: flex; flex: 1; overflow: hidden; }

  .sidebar {
    width: 300px; flex-shrink: 0; background: var(--color-background-primary);
    border-right: 0.5px solid var(--color-border-tertiary);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .tab-bar { display: flex; border-bottom: 0.5px solid var(--color-border-tertiary); flex-shrink: 0; }
  .tab-btn {
    flex: 1; padding: 12px 4px; font-size: 13px; border: none; background: none;
    cursor: pointer; color: var(--color-text-secondary); border-bottom: 2px solid transparent;
  }
  .tab-btn.active { color: var(--color-text-primary); border-bottom-color: #111; font-weight: 600; }
  .tab-content { flex: 1; overflow-y: auto; padding: 16px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .field-group { margin-bottom: 20px; }
  .field-label { font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block; }
  
  input[type=file], input[type=text], select, textarea {
    width: 100%; padding: 10px; font-size: 13px; border: 1px solid var(--color-border-secondary); border-radius: 8px; outline: none;
  }
  textarea { height: 80px; resize: none; }
  input[type=range] { width: 100%; accent-color: #111; margin-top: 8px; }

  .opt-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .opt-btn {
    padding: 8px 2px; border: 1px solid var(--color-border-secondary); border-radius: 6px;
    background: none; cursor: pointer; font-size: 11px; color: var(--color-text-secondary);
    transition: all 0.2s;
  }
  .opt-btn.active { background: #111; border-color: #111; color: #fff; font-weight: bold; }

  .preview-area {
    flex: 1; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 40px; background: #222;
  }
  .preview-scaler { transform-origin: center center; box-shadow: 0 40px 80px rgba(0,0,0,0.6); }

  .card { position: relative; width: 1920px; height: 1080px; background: #000; overflow: hidden; }
  .card-bg { 
    position: absolute; inset: 0; 
    background-size: cover; 
    background-position: center; 
    opacity: 1; /* 調整透明度 */
    transition: 0.3s; 
  }
  
  .char-art { position: absolute; z-index: 3; transform-origin: bottom center; }
  .char-art img { display: block; pointer-events: none; }

  .card-bottom-grad {
    position: absolute; inset-x: 0; bottom: 0; height: 550px;
    background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0) 100%);
    z-index: 4; pointer-events: none;
  }

  .card-overlay { position: absolute; inset: 0; z-index: 10; pointer-events: none; padding: 80px 120px; }
  
  .card-logo { position: absolute; left: 340px; top: 160px; width: 500px; opacity: 0.8; }
  .card-logo img { width: 100%; filter: brightness(0) invert(1); }

  .card-stars { position: absolute; left: 560px; top: 540px; display: flex; align-items: center; }
  .star-icon { width: 155px; height: 155px; margin-left: -38px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.3)); }
  .star-icon:first-child { margin-left: 0; }

  .info-row { position: absolute; left: 560px; top: 660px; display: flex; align-items: center; }
  .class-icon-wrap { width: 180px; height: 180px; margin-right: 30px; }
  .class-icon-img { width: 100%; height: 100%; filter: brightness(0) invert(1); }
  
  .name-zh { font-size: 150px; font-weight: 900; color: #fff; line-height: 0.9; text-shadow: 0 5px 20px rgba(0,0,0,0.5); }
  .name-en { font-size: 55px; font-weight: 700; color: rgba(255,255,255,0.4); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 5px; }

  .card-tagline {
    position: absolute; left: 320px; bottom: 100px; width: 1200px;
    font-size: 34px; color: #fff; line-height: 1.6; border-left: 10px solid #fff; padding-left: 35px;
  }

  .drag-overlay { position: absolute; inset: 0; z-index: 8; cursor: move; display: none; }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <span class="logo">ARK_RECRUIT_MAKER</span>
    <div class="header-btns">
        <button class="btn-random" onclick="randomOperator()">🎲 隨機幹員</button>
        <button class="btn-export" onclick="exportCard()">導出 PNG 圖片</button>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('appearance',this)">外觀設定</button>
        <button class="tab-btn" onclick="switchTab('role',this)">屬性設定</button>
        <button class="tab-btn" onclick="switchTab('text',this)">文本設定</button>
      </div>

      <div class="tab-content">
        <div class="tab-panel active" id="tab-appearance">
          <div class="field-group">
            <label class="field-label">幹員立繪 (PNG)</label>
            <input type="file" accept="image/*" onchange="loadFile(event, 'charImg')">
          </div>
          <div class="field-group">
            <label class="field-label">立繪大小</label>
            <input type="range" id="sizeRange" min="30" max="250" value="120" oninput="updateScale(this.value)">
          </div>
          <div class="field-group">
            <label class="field-label">背景圖片</label>
            <input type="file" accept="image/*" onchange="loadFile(event, 'cardBg')">
          </div>
        </div>

        <div class="tab-panel" id="tab-role">
          <div class="field-group">
            <label class="field-label">稀有度</label>
            <div class="opt-grid" id="starGrid">
              <button class="opt-btn" onclick="setStar(3, this)">3★</button>
              <button class="opt-btn" onclick="setStar(4, this)">4★</button>
              <button class="opt-btn" onclick="setStar(5, this)">5★</button>
              <button class="opt-btn active" onclick="setStar(6, this)">6★</button>
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">職業</label>
            <div class="opt-grid" id="classGrid">
              <button class="opt-btn active" data-type="vanguard" onclick="setClass('vanguard', this)">先鋒</button>
              <button class="opt-btn" data-type="guard" onclick="setClass('guard', this)">近衛</button>
              <button class="opt-btn" data-type="defender" onclick="setClass('defender', this)">重裝</button>
              <button class="opt-btn" data-type="sniper" onclick="setClass('sniper', this)">狙擊</button>
              <button class="opt-btn" data-type="caster" onclick="setClass('caster', this)">術師</button>
              <button class="opt-btn" data-type="medic" onclick="setClass('medic', this)">醫療</button>
              <button class="opt-btn" data-type="supporter" onclick="setClass('supporter', this)">輔助</button>
              <button class="opt-btn" data-type="specialist" onclick="setClass('specialist', this)">特種</button>
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">所屬陣營</label>
            <select id="factionSelect" onchange="updateFaction()">
              <option value="logo_rhodes">羅德島</option>
              <option value="logo_yan">炎</option>
              <option value="logo_lungmen">炎-龍門</option>
              <option value="logo_egir">阿戈爾</option>
              <option value="logo_bolivar">玻利瓦爾</option>
              <option value="logo_columbia">哥倫比亞</option>
              <option value="logo_higashi">東</option>
              <option value="logo_iberia">伊比利亞</option>
              <option value="logo_kazimierz">卡西米爾</option>
              <option value="logo_kjerag">謝拉格</option>
              <option value="logo_laterano">拉特蘭</option>
              <option value="logo_leithanien">萊塔尼亞</option>
              <option value="logo_minos">米諾斯</option>
              <option value="logo_rim">雷姆必拓</option>
              <option value="logo_sami">薩米</option>
              <option value="logo_sargon">薩爾貢</option>
              <option value="logo_siracusa">敘拉古</option>
              <option value="logo_ursus">烏薩斯</option>
              <option value="logo_victoria">維多利亞</option>
              <option value="logo_babel">巴別塔</option>
              <option value="logo_blacksteel">黑鋼國際</option>
              <option value="logo_rhine">萊茵生命</option>
              <option value="logo_penguin">企鵝物流</option>
              <option value="logo_lee">鯉氏偵探事務所</option>
              <option value="logo_rainbow">虹彩小隊</option>
            </select>
          </div>
        </div>

        <div class="tab-panel" id="tab-text">
          <div class="field-group">
            <label class="field-label">中文名稱</label>
            <input type="text" id="inZh" value="阿米婭" oninput="syncText()">
          </div>
          <div class="field-group">
            <label class="field-label">英文名稱</label>
            <input type="text" id="inEn" value="AMIYA" oninput="syncText()">
          </div>
          <div class="field-group">
            <label class="field-label">個人簡介 / 台詞</label>
            <textarea id="inSay" oninput="syncText()">博士，我們的工作還沒有結束。請下達指令吧。</textarea>
          </div>
        </div>
      </div>
    </aside>

    <section class="preview-area" id="previewArea">
      <div class="preview-scaler" id="previewScaler">
        <div class="card" id="card">
          <div class="card-bg" id="cardBg" style="background-image: url('image_6072c4.jpg');"></div>
          
          <div class="char-art" id="charArt" style="left:1000px; bottom:0px; display:none;">
            <img id="charImg" src="" crossorigin="anonymous">
          </div>

          <div class="card-bottom-grad"></div>

          <div class="card-overlay">
            <div class="card-logo"><img id="factionLogo" src=""></div>
            <div class="card-stars" id="cardStars"></div>
            
            <div class="info-row">
              <div class="class-icon-wrap">
                <img id="classIcon" class="class-icon-img" src="">
              </div>
              <div>
                <div class="name-zh" id="outZh">阿米婭</div>
                <div class="name-en" id="outEn">AMIYA</div>
              </div>
            </div>
            
            <div class="card-tagline" id="outSay"></div>
          </div>
          <div class="drag-overlay" id="dragOverlay"></div>
        </div>
      </div>
    </section>
  </div>
</div>

<script>
  const RAW_URL = "https://raw.githubusercontent.com/PuppiizSunniiz/Arknight-Images/main";
  const STAR_SVG = `<svg width="161" height="165" viewBox="0 0 161 165" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M150.856 73.4283L100.028 95.0034L104.84 150.011L68.6145 108.338L17.7868 129.913L46.2258 82.5822L10 40.9092L63.802 53.3304L92.241 6L97.0535 61.0071L150.856 73.4283Z" fill="white"/></svg>`;

  // 幹員資料庫
  const OPERATORS = [
    { zh: "阿米婭", en: "AMIYA", star: 5, class: "caster", faction: "logo_rhodes", say: "博士，我們的工作還沒有結束。請下達指令吧。", img: "char_002_amiya_1.png" },
    { zh: "凱爾希", en: "KAL'TSIT", star: 6, class: "medic", faction: "logo_rhodes", say: "我知道你在想什麼，博士。但現在還不是回憶的時候。", img: "char_003_kalts_1.png" },
    { zh: "陳", en: "CH'EN", star: 6, class: "guard", faction: "logo_lungmen", say: "龍門近衛局特別督察組組長，陳。以此身份與羅德島展開協作。", img: "char_010_chen_1.png" },
    { zh: "銀灰", en: "SILVERASH", star: 6, class: "guard", faction: "logo_kjerag", say: "希瓦艾什家長子，謝拉格軍閥，喀蘭貿易公司董事長，銀灰。為盟友而來。", img: "char_172_silver_1.png" },
    { zh: "能天使", en: "EXUSIAI", star: 6, class: "sniper", faction: "logo_penguin", say: "企鵝物流，能天使。請多指教！", img: "char_103_angel_1.png" },
    { zh: "濁心斯卡蒂", en: "SKADI THE CORRUPTING HEART", star: 6, class: "supporter", faction: "logo_egir", say: "你在這裡。我們又見面了，哪怕這只是一個夢。", img: "char_1012_skadi2_1.png" },
    { zh: "史爾特爾", en: "SURTR", star: 6, class: "guard", faction: "logo_rhodes", say: "你就是那個人們口中的博士嗎？看著還算有點精神嘛。", img: "char_350_surtr_1.png" }
  ];

  let state = { x: 1000, y: 0, dragging: false };

  window.onload = () => {
    setStar(6);
    setClass('vanguard'); 
    updateFaction();
    syncText();
    fitPreview();
    initDrag();
    window.addEventListener('resize', fitPreview);
  };

  function randomOperator() {
    const op = OPERATORS[Math.floor(Math.random() * OPERATORS.length)];
    document.getElementById('inZh').value = op.zh;
    document.getElementById('inEn').value = op.en;
    document.getElementById('inSay').value = op.say;
    syncText();

    const starBtns = document.querySelectorAll('#starGrid .opt-btn');
    setStar(op.star, starBtns[op.star - 3]);

    const classBtns = document.querySelectorAll('#classGrid .opt-btn');
    const targetBtn = Array.from(classBtns).find(b => b.dataset.type === op.class);
    setClass(op.class, targetBtn);

    document.getElementById('factionSelect').value = op.faction;
    updateFaction();

    const imgUrl = `${RAW_URL}/operators/${op.img}`;
    const img = document.getElementById('charImg');
    img.src = imgUrl;
    img.onload = () => {
        document.getElementById('charArt').style.display = 'block';
        document.getElementById('dragOverlay').style.display = 'block';
        state.x = 1000; state.y = 0;
        document.getElementById('charArt').style.left = '1000px';
        document.getElementById('charArt').style.bottom = '0px';
    };
  }

  function switchTab(name, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }

  function setClass(type, btn) {
    document.getElementById('classIcon').src = `${RAW_URL}/classes/class_${type}.png`;
    if(btn) {
      btn.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  }

  function loadFile(e, type) {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    if (type === 'charImg') {
      const img = document.getElementById('charImg');
      img.src = url;
      img.onload = () => {
        document.getElementById('charArt').style.display = 'block';
        document.getElementById('dragOverlay').style.display = 'block';
      };
    } else {
      document.getElementById('cardBg').style.backgroundImage = `url(${url})`;
    }
  }

  function updateScale(v) {
    document.getElementById('charImg').style.width = (v * 10) + 'px';
  }

  function setStar(num, btn) {
    const container = document.getElementById('cardStars');
    const dataUrl = 'data:image/svg+xml,' + encodeURIComponent(STAR_SVG);
    let html = '';
    for(let i=0; i<num; i++) {
      html += `<img src="${dataUrl}" class="star-icon">`;
    }
    container.innerHTML = html;
    if(btn) {
      btn.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  }

  function updateFaction() {
    const val = document.getElementById('factionSelect').value;
    document.getElementById('factionLogo').src = `${RAW_URL}/factions/${val}.png`;
  }

  function syncText() {
    document.getElementById('outZh').innerText = document.getElementById('inZh').value;
    document.getElementById('outEn').innerText = document.getElementById('inEn').value;
    document.getElementById('outSay').innerText = document.getElementById('inSay').value;
  }

  function fitPreview() {
    const area = document.getElementById('previewArea');
    const scale = Math.min((area.clientWidth - 80) / 1920, (area.clientHeight - 80) / 1080);
    document.getElementById('previewScaler').style.transform = `scale(${scale})`;
  }

  function initDrag() {
    const overlay = document.getElementById('dragOverlay');
    const art = document.getElementById('charArt');
    const start = (e) => {
      state.dragging = true;
      const ev = e.touches ? e.touches[0] : e;
      state.startX = ev.clientX; state.startY = ev.clientY;
      const area = document.getElementById('previewArea');
      state.viewScale = Math.min((area.clientWidth - 80) / 1920, (area.clientHeight - 80) / 1080);
    };
    const move = (e) => {
      if (!state.dragging) return;
      const ev = e.touches ? e.touches[0] : e;
      state.x += (ev.clientX - state.startX) / state.viewScale;
      state.y += (ev.clientY - state.startY) / state.viewScale;
      art.style.left = state.x + 'px'; 
      art.style.bottom = (-state.y) + 'px';
      state.startY = ev.clientY; state.startX = ev.clientX;
    };
    overlay.addEventListener('mousedown', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', () => state.dragging = false);
  }

  function exportCard() {
    const card = document.getElementById('card');
    html2canvas(card, { useCORS: true, width: 1920, height: 1080, scale: 1 }).then(canvas => {
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = `ARK-Card-${Date.now()}.png`;
      a.click();
    });
  }
</script>
</body>
</html>
