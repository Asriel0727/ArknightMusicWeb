name: Sync operator assets

on:
  workflow_dispatch:
  schedule:
    - cron: '20 18 * * 0'

permissions:
  contents: write

concurrency:
  group: sync-operator-assets
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Audit all operator assets
        run: npm run assets:audit -- --include-portraits
      - name: Download missing assets
        shell: bash
        run: |
          for type in avatars factions classes portraits items skills modules; do
            npm run assets:sync -- --type "$type"
          done
      - name: Commit updated assets
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No asset changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/images
          git commit -m "chore: sync operator assets"
          git push
