name: Build portable release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build portable package
        run: npm run build:portable

      - name: Create ZIP
        run: zip -r ArknightMusicWeb-portable.zip dist-portable

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" ArknightMusicWeb-portable.zip --title "${GITHUB_REF_NAME}" --notes "Portable build for ArknightMusicWeb."
